<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" fill="none" role="img" aria-label="KI READY Training – isometrische Illustration">
  <defs>
    <!-- Soft shadow for the floating platform -->
    <filter id="f-platform" x="-12%" y="-10%" width="124%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#1e1b4b" flood-opacity="0.10"/>
    </filter>
    <!-- Shadow for cubes and objects -->
    <filter id="f-obj" x="-25%" y="-25%" width="150%" height="200%">
      <feDropShadow dx="2" dy="7" stdDeviation="7" flood-color="#1e1b4b" flood-opacity="0.22"/>
    </filter>
    <!-- Halo glow for the neural network brain -->
    <filter id="f-brain" x="-28%" y="-28%" width="156%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1e1b4b" flood-opacity="0.20"/>
    </filter>
    <!-- Glow for orbit rings -->
    <filter id="f-glow" x="-25%" y="-60%" width="150%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip to platform top face -->
    <clipPath id="cp-platform">
      <polygon points="300,262 492,362 300,454 108,362"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════════════════
       FLOATING PLATFORM
  ═══════════════════════════════════════════ -->
  <g filter="url(#f-platform)">
    <!-- Top surface -->
    <polygon points="300,262 492,362 300,454 108,362" fill="#edf1f8"/>
    <!-- Right face (darker) -->
    <polygon points="492,362 492,378 300,470 300,454" fill="#c4cedf"/>
    <!-- Left face (medium) -->
    <polygon points="108,362 108,378 300,470 300,454" fill="#d3dcea"/>
  </g>

  <!-- Circuit grid lines on platform top -->
  <g clip-path="url(#cp-platform)" stroke="#bac4d3" stroke-width="0.85" opacity="0.75">
    <!-- Lines going upper-right (parallel to right edge) -->
    <line x1="138" y1="382" x2="352" y2="278"/>
    <line x1="174" y1="402" x2="388" y2="298"/>
    <line x1="210" y1="420" x2="424" y2="316"/>
    <line x1="246" y1="440" x2="460" y2="336"/>
    <!-- Lines going upper-left (parallel to left edge) -->
    <line x1="255" y1="266" x2="467" y2="396"/>
    <line x1="220" y1="284" x2="432" y2="414"/>
    <line x1="185" y1="302" x2="397" y2="432"/>
    <line x1="150" y1="320" x2="362" y2="450"/>
    <!-- Small L-junction accents -->
    <polyline points="298,284 298,296 311,303" stroke-width="0.7"/>
    <polyline points="258,307 270,300 270,313" stroke-width="0.7"/>
    <polyline points="344,306 344,295 357,288" stroke-width="0.7"/>
    <polyline points="230,350 242,343 242,356" stroke-width="0.7"/>
    <polyline points="370,350 370,339 383,332" stroke-width="0.7"/>
    <!-- Junction dots -->
    <circle cx="256" cy="310" r="2.5" fill="#aab5c6" stroke="none"/>
    <circle cx="344" cy="310" r="2.5" fill="#aab5c6" stroke="none"/>
    <circle cx="216" cy="336" r="2" fill="#aab5c6" stroke="none"/>
    <circle cx="384" cy="336" r="2" fill="#aab5c6" stroke="none"/>
    <circle cx="300" cy="362" r="2.5" fill="#aab5c6" stroke="none"/>
    <circle cx="258" cy="362" r="1.8" fill="#aab5c6" stroke="none"/>
    <circle cx="342" cy="362" r="1.8" fill="#aab5c6" stroke="none"/>
  </g>

  <!-- ═══════════════════════════════════════════
       LIGHT CUBES (3) — placed first (back)
  ═══════════════════════════════════════════ -->
  <g filter="url(#f-obj)">
    <!-- Light cube A: top-apex (304, 308), s=22 | h≈19.1, v=11 -->
    <polygon points="304,308 323.1,319 304,330 284.9,319" fill="#e6eaf4"/>
    <polygon points="323.1,319 323.1,341 304,352 304,330" fill="#aeb9cd"/>
    <polygon points="284.9,319 304,330 304,352 284.9,341" fill="#c4cedf"/>

    <!-- Light cube B: top-apex (346, 332), s=18 | h≈15.6, v=9 -->
    <polygon points="346,332 361.6,341 346,350 330.4,341" fill="#e6eaf4"/>
    <polygon points="361.6,341 361.6,359 346,368 346,350" fill="#aeb9cd"/>
    <polygon points="330.4,341 346,350 346,368 330.4,359" fill="#c4cedf"/>

    <!-- Light cube C: top-apex (260, 343), s=16 | h≈13.9, v=8 -->
    <polygon points="260,343 273.9,351 260,359 246.1,351" fill="#e6eaf4"/>
    <polygon points="273.9,351 273.9,367 260,375 260,359" fill="#aeb9cd"/>
    <polygon points="246.1,351 260,359 260,375 246.1,367" fill="#c4cedf"/>
  </g>

  <!-- ═══════════════════════════════════════════
       ORANGE CUBES (4)
  ═══════════════════════════════════════════ -->
  <g filter="url(#f-obj)">
    <!-- Orange cube 1: top-apex (180, 292), s=30 | h≈26, v=15 -->
    <polygon points="180,292 206,307 180,322 154,307" fill="#fb923c"/>
    <polygon points="206,307 206,337 180,352 180,322" fill="#b93f08"/>
    <polygon points="154,307 180,322 180,352 154,337" fill="#e05b0a"/>

    <!-- Orange cube 2: top-apex (238, 312), s=26 | h≈22.5, v=13 -->
    <polygon points="238,312 260.5,325 238,338 215.5,325" fill="#fb923c"/>
    <polygon points="260.5,325 260.5,351 238,364 238,338" fill="#b93f08"/>
    <polygon points="215.5,325 238,338 238,364 215.5,351" fill="#e05b0a"/>

    <!-- Orange cube 3: top-apex (394, 294), s=30 | h≈26, v=15 -->
    <polygon points="394,294 420,309 394,324 368,309" fill="#fb923c"/>
    <polygon points="420,309 420,339 394,354 394,324" fill="#b93f08"/>
    <polygon points="368,309 394,324 394,354 368,339" fill="#e05b0a"/>

    <!-- Orange cube 4: top-apex (440, 318), s=24 | h≈20.8, v=12 -->
    <polygon points="440,318 460.8,330 440,342 419.2,330" fill="#fb923c"/>
    <polygon points="460.8,330 460.8,354 440,366 440,342" fill="#b93f08"/>
    <polygon points="419.2,330 440,342 440,366 419.2,354" fill="#e05b0a"/>
  </g>

  <!-- ═══════════════════════════════════════════
       NEURAL NETWORK BRAIN (navy blob, floating)
  ═══════════════════════════════════════════ -->
  <g filter="url(#f-brain)">
    <!-- Brain blob — navy -->
    <path d="M 234,156 C 232,117 253,88 282,82 C 294,78 306,78 318,82 C 347,88 368,117 366,156 C 371,181 355,207 335,214 C 319,224 281,224 265,214 C 245,207 229,181 234,156 Z" fill="#1e3a8a"/>

    <!-- Neural connections (white, low opacity) -->
    <g stroke="rgba(255,255,255,0.20)" stroke-width="1" stroke-linecap="round">
      <!-- Outer ring connections -->
      <line x1="282" y1="98" x2="300" y2="90"/>
      <line x1="300" y1="90" x2="318" y2="98"/>
      <line x1="318" y1="98" x2="348" y2="124"/>
      <line x1="348" y1="124" x2="352" y2="158"/>
      <line x1="352" y1="158" x2="333" y2="196"/>
      <line x1="333" y1="196" x2="300" y2="206"/>
      <line x1="300" y1="206" x2="267" y2="196"/>
      <line x1="267" y1="196" x2="248" y2="158"/>
      <line x1="248" y1="158" x2="252" y2="124"/>
      <line x1="252" y1="124" x2="282" y2="98"/>
      <!-- Spokes to center -->
      <line x1="282" y1="98"  x2="300" y2="150"/>
      <line x1="318" y1="98"  x2="300" y2="150"/>
      <line x1="352" y1="158" x2="300" y2="150"/>
      <line x1="248" y1="158" x2="300" y2="150"/>
      <line x1="300" y1="206" x2="300" y2="150"/>
    </g>

    <!-- Light blue nodes (non-accent) -->
    <circle cx="282" cy="98"  r="5"   fill="#93c5fd"/>
    <circle cx="300" cy="90"  r="4.5" fill="#93c5fd"/>
    <circle cx="348" cy="124" r="4.5" fill="#93c5fd"/>
    <circle cx="333" cy="196" r="4.5" fill="#93c5fd"/>
    <circle cx="267" cy="196" r="4"   fill="#93c5fd"/>
    <circle cx="252" cy="124" r="4"   fill="#93c5fd"/>

    <!-- Orange accent nodes (4) -->
    <circle cx="318" cy="98"  r="6"   fill="#f97316"/>
    <circle cx="352" cy="158" r="5.5" fill="#f97316"/>
    <circle cx="300" cy="206" r="5.5" fill="#f97316"/>
    <circle cx="248" cy="158" r="6"   fill="#f97316"/>

    <!-- Central hub node -->
    <circle cx="300" cy="150" r="9"   fill="#3b82f6"/>
    <circle cx="300" cy="150" r="4.5" fill="white" opacity="0.85"/>
  </g>

  <!-- ═══════════════════════════════════════════
       ORBIT RINGS
  ═══════════════════════════════════════════ -->
  <!-- Ring 1: orange, inner, tilted -13° -->
  <ellipse
    cx="300" cy="156"
    rx="92" ry="22"
    stroke="#f97316" stroke-width="1.5" stroke-opacity="0.55"
    fill="none"
    transform="rotate(-13, 300, 156)"
    filter="url(#f-glow)"
  />
  <!-- Ring 1 endpoint dots (positions computed for -13° rotation) -->
  <circle cx="390" cy="135" r="3.5" fill="#f97316" opacity="0.75"/>
  <circle cx="210" cy="177" r="3.5" fill="#f97316" opacity="0.75"/>

  <!-- Ring 2: indigo, outer, tilted +9° — dashed for depth -->
  <ellipse
    cx="300" cy="150"
    rx="116" ry="28"
    stroke="#818cf8" stroke-width="1.2" stroke-opacity="0.42"
    stroke-dasharray="7 9"
    fill="none"
    transform="rotate(9, 300, 150)"
  />
  <!-- Ring 2 small accent dot -->
  <circle cx="186" cy="143" r="2.5" fill="#818cf8" opacity="0.55" transform="rotate(9, 300, 150)"/>
</svg>
