<svg width="1640" height="624" viewBox="0 0 1640 624" role="img" xmlns="http://www.w3.org/2000/svg">
<title>KWAIX Facebook Cover</title>
<desc>KI spart Zeit. Nur wenn Ihr Team weiß, wie.</desc>

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#060e35"/>
    <stop offset="40%" stop-color="#08123f"/>
    <stop offset="100%" stop-color="#0d0828"/>
  </linearGradient>
  <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#a21caf" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="#a21caf" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="glow2" x1="1" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ec4899" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="textgrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#a5b4fc"/>
    <stop offset="100%" stop-color="#f43f5e"/>
  </linearGradient>
  <linearGradient id="logograd" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#a21caf"/>
    <stop offset="100%" stop-color="#ec4899"/>
  </linearGradient>
  <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#a21caf" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#ec4899" stop-opacity="0.15"/>
  </linearGradient>
</defs>

<rect width="1640" height="624" fill="url(#bg)"/>
<ellipse cx="1300" cy="180" rx="420" ry="280" fill="url(#glow1)"/>
<ellipse cx="1500" cy="480" rx="260" ry="200" fill="url(#glow2)"/>
<ellipse cx="300" cy="300" rx="320" ry="260" fill="url(#glow1)" opacity="0.45"/>
<ellipse cx="820" cy="100" rx="200" ry="140" fill="url(#glow2)" opacity="0.3"/>

<line x1="0" y1="0" x2="1640" y2="0" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
<line x1="0" y1="623" x2="1640" y2="623" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

<!-- Logo -->
<text x="820" y="172" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="800" letter-spacing="6" fill="white" opacity="0.45">KWAIX</text>

<!-- Divider -->
<line x1="620" y1="196" x2="1020" y2="196" stroke="white" stroke-opacity="0.12" stroke-width="0.5"/>

<!-- Zeile 1: weiß -->
<text x="820" y="298" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="82" font-weight="800" letter-spacing="-2.5" fill="white">KI spart Zeit.</text>

<!-- Zeile 2: Gradient -->
<text x="820" y="390" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="82" font-weight="800" letter-spacing="-2.5" fill="url(#textgrad)">Nur wenn Ihr Team weiß, wie.</text>

<!-- Subline -->
<text x="820" y="440" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="300" fill="white" opacity="0.65" letter-spacing="0.8">KI-Training · Kompetenznachweis Artikel 4 KI-VO · DE · AT · CH</text>

<!-- Pills -->
<rect x="442" y="476" width="148" height="30" rx="15" fill="url(#pill)" stroke="#a21caf" stroke-width="0.5" stroke-opacity="0.5"/>
<text x="516" y="496" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="500" fill="white" letter-spacing="0.3">Remote · Vor Ort</text>

<rect x="606" y="476" width="148" height="30" rx="15" fill="url(#pill)" stroke="#a21caf" stroke-width="0.5" stroke-opacity="0.5"/>
<text x="680" y="496" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="500" fill="white" letter-spacing="0.3">Ab 2.400 € netto</text>

<rect x="770" y="476" width="110" height="30" rx="15" fill="url(#pill)" stroke="#a21caf" stroke-width="0.5" stroke-opacity="0.5"/>
<text x="825" y="496" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="500" fill="white" letter-spacing="0.3">kwaix.de</text>

<rect x="896" y="476" width="148" height="30" rx="15" fill="url(#pill)" stroke="#a21caf" stroke-width="0.5" stroke-opacity="0.5"/>
<text x="970" y="496" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="500" fill="white" letter-spacing="0.3">Kostenlos anfragen</text>

<!-- Bottom URL -->
<text x="820" y="570" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="url(#logograd)" letter-spacing="1">kwaix.de</text>

</svg>
