<svg width="1128" height="191" viewBox="0 0 1128 191" role="img" xmlns="http://www.w3.org/2000/svg">
<title>KWAIX LinkedIn Company Page Banner</title>
<desc>KI spart Zeit. Nur wenn Ihr Team weiß, wie.</desc>

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#060e35"/>
    <stop offset="40%" stop-color="#08123f"/>
    <stop offset="100%" stop-color="#0d0828"/>
  </linearGradient>
  <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#a21caf" stop-opacity="0.20"/>
    <stop offset="100%" stop-color="#a21caf" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="glow2" x1="1" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ec4899" stop-opacity="0.16"/>
    <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="textgrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#a5b4fc"/>
    <stop offset="100%" stop-color="#f43f5e"/>
  </linearGradient>
  <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#a21caf" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#ec4899" stop-opacity="0.15"/>
  </linearGradient>
  <clipPath id="clip-claim">
    <rect x="0" y="62" width="1128" height="56"/>
  </clipPath>
</defs>

<rect width="1128" height="191" fill="url(#bg)"/>
<ellipse cx="900" cy="60" rx="300" ry="120" fill="url(#glow1)"/>
<ellipse cx="1050" cy="150" rx="180" ry="100" fill="url(#glow2)"/>
<ellipse cx="400" cy="96" rx="200" ry="120" fill="url(#glow1)" opacity="0.5"/>
<line x1="0" y1="0" x2="1128" y2="0" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
<line x1="0" y1="190" x2="1128" y2="190" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

<!-- Zeile 1: weiß -->
<text x="564" y="60" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="800" letter-spacing="-1.5" fill="white">KI spart Zeit.</text>

<!-- Zeile 2: Gradient via fill="url(#textgrad)" -->
<text x="564" y="104" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="800" letter-spacing="-1.5" fill="url(#textgrad)">Nur wenn Ihr Team weiß, wie.</text>

<text x="564" y="130" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="300" fill="white" opacity="0.70" letter-spacing="0.5">KI-Training · Kompetenznachweis Artikel 4 KI-VO · DE · AT · CH</text>

<rect x="308" y="148" width="128" height="24" rx="12" fill="url(#pill)" stroke="#a21caf" stroke-width="0.5" stroke-opacity="0.5"/>
<text x="372" y="164" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" fill="white" letter-spacing="0.3">Remote · Vor Ort</text>

<rect x="450" y="148" width="120" height="24" rx="12" fill="url(#pill)" stroke="#a21caf" stroke-width="0.5" stroke-opacity="0.5"/>
<text x="510" y="164" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" fill="white" letter-spacing="0.3">Ab 2.400 € netto</text>

<rect x="584" y="148" width="108" height="24" rx="12" fill="url(#pill)" stroke="#a21caf" stroke-width="0.5" stroke-opacity="0.5"/>
<text x="638" y="164" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" fill="white" letter-spacing="0.3">kwaix.de</text>

<rect x="706" y="148" width="108" height="24" rx="12" fill="url(#pill)" stroke="#a21caf" stroke-width="0.5" stroke-opacity="0.5"/>
<text x="760" y="164" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" fill="white" letter-spacing="0.3">Kostenlos anfragen</text>

</svg>
