backend:
  name: github
  repo: madop-dev/kwaix-hugo
  branch: master
  base_url: https://kwaix-cms-auth.md-5ec.workers.dev

media_folder: static/images
public_folder: /images
locale: de

collections:
  - name: startseite
    label: "Startseite"
    files:
      - name: homepage
        label: "Startseite (nur Titel/Beschreibung/FAQ — Sektionen sind im Template fest)"
        file: content/_index.md
        fields:
          - { label: "Titel", name: title, widget: string }
          - { label: "Beschreibung", name: description, widget: text }
          - label: "FAQ-Items"
            name: faqItems
            widget: list
            required: false
            fields:
              - { label: "Frage", name: q, widget: string }
              - { label: "Antwort", name: a, widget: text }

