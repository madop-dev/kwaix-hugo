<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" role="img" aria-labelledby="kwaix-kivo-flow-title">
  <title id="kwaix-kivo-flow-title">Ablauf: Schulung führt zu Kompetenznachweis, KI-Policy und laufenden Updates</title>
  <defs>
    <linearGradient id="flowIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="flowCoral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c7d2fe"/>
    </marker>
  </defs>

  <rect width="1200" height="240" fill="#ffffff"/>

  <!-- connector arrows -->
  <line x1="200" y1="80" x2="290" y2="80" stroke="#c7d2fe" stroke-width="4" marker-end="url(#arrowhead)"/>
  <line x1="500" y1="80" x2="590" y2="80" stroke="#c7d2fe" stroke-width="4" marker-end="url(#arrowhead)"/>
  <line x1="800" y1="80" x2="890" y2="80" stroke="#c7d2fe" stroke-width="4" marker-end="url(#arrowhead)"/>

  <!-- Step 1: Schulung -->
  <g>
    <rect x="40" y="20" width="160" height="120" rx="14" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="72" y="44" width="48" height="48" rx="10" fill="url(#flowIndigo)"/>
    <rect x="88" y="58" width="16" height="12" fill="none" stroke="#ffffff" stroke-width="3"/>
    <path d="M 84 70 v 12 M 112 70 v 12" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <text x="120" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="17" font-weight="700" fill="#111827">Schulung</text>
  </g>

  <!-- Step 2: Kompetenznachweis -->
  <g>
    <rect x="300" y="20" width="200" height="120" rx="14" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="332" y="44" width="48" height="48" rx="10" fill="url(#flowCoral)"/>
    <circle cx="356" cy="62" r="12" fill="none" stroke="#ffffff" stroke-width="3"/>
    <path d="M 348 76 l -6 14 l 14 -4 z" fill="#ffffff"/>
    <path d="M 364 76 l 6 14 l -14 -4 z" fill="#ffffff"/>
    <text x="400" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="17" font-weight="700" fill="#111827">Kompetenznachweis</text>
  </g>

  <!-- Step 3: KI-Policy -->
  <g>
    <rect x="600" y="20" width="200" height="120" rx="14" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="632" y="44" width="48" height="48" rx="10" fill="url(#flowIndigo)"/>
    <rect x="648" y="56" width="24" height="32" rx="3" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="653" y1="64" x2="667" y2="64" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="653" y1="72" x2="667" y2="72" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="653" y1="80" x2="663" y2="80" stroke="#ffffff" stroke-width="2.5"/>
    <text x="700" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="17" font-weight="700" fill="#111827">KI-Policy</text>
  </g>

  <!-- Step 4: laufende Updates -->
  <g>
    <rect x="900" y="20" width="260" height="120" rx="14" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="932" y="44" width="48" height="48" rx="10" fill="url(#flowCoral)"/>
    <path d="M 956 50 a 18 18 0 1 0 0.01 0" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <path d="M 956 50 l 0 -6 l 6 3 z" fill="#ffffff"/>
    <text x="1030" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="17" font-weight="700" fill="#111827">laufende Updates</text>
  </g>

  <!-- loop arrow back from step 4 to step 3 (continuous review cycle) -->
  <path d="M 1030 150 C 1030 190, 700 190, 700 150" fill="none" stroke="#fecdd3" stroke-width="3" stroke-dasharray="2 10" marker-end="url(#arrowhead)"/>
</svg>
