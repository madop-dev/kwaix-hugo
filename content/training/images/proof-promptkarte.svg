<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="kwaix-promptkarte-title">
  <title id="kwaix-promptkarte-title">Beispiel-Promptkarte für eine Angebots-E-Mail mit Rolle, Aufgabe, Kontext und Format</title>
  <defs>
    <linearGradient id="pkIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="pkCoral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="pkBlob" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="520" fill="#ffffff"/>

  <!-- soft organic background accents -->
  <circle cx="1120" cy="60" r="120" fill="url(#pkBlob)"/>
  <circle cx="60" cy="480" r="100" fill="url(#pkBlob)"/>

  <!-- card -->
  <rect x="60" y="40" width="1080" height="440" rx="28" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>

  <!-- badge + heading -->
  <rect x="100" y="76" width="150" height="36" rx="18" fill="url(#pkIndigo)"/>
  <text x="175" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Promptkarte</text>
  <text x="100" y="160" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#111827">Angebots-E-Mail an Bestandskunden</text>

  <!-- Row: Rolle -->
  <g>
    <circle cx="124" cy="220" r="24" fill="url(#pkIndigo)"/>
    <circle cx="124" cy="213" r="6" fill="#ffffff"/>
    <path d="M 112 228 a 12 10 0 0 1 24 0 Z" fill="#ffffff"/>
    <text x="160" y="212" font-family="Inter, sans-serif" font-size="17" font-weight="700" fill="#111827">Rolle</text>
    <rect x="160" y="222" width="420" height="14" rx="7" fill="#e5e7eb"/>
    <rect x="160" y="244" width="280" height="14" rx="7" fill="#eef2ff"/>
  </g>

  <!-- Row: Aufgabe -->
  <g>
    <circle cx="124" cy="300" r="24" fill="url(#pkCoral)"/>
    <rect x="113" y="290" width="22" height="20" rx="3" fill="none" stroke="#ffffff" stroke-width="3"/>
    <path d="M 117 296 l 4 4 l 8 -9" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="160" y="292" font-family="Inter, sans-serif" font-size="17" font-weight="700" fill="#111827">Aufgabe</text>
    <rect x="160" y="302" width="520" height="14" rx="7" fill="#e5e7eb"/>
    <rect x="160" y="324" width="380" height="14" rx="7" fill="#fff1f2"/>
  </g>

  <!-- Row: Kontext -->
  <g>
    <circle cx="124" cy="380" r="24" fill="url(#pkIndigo)"/>
    <rect x="112" y="370" width="24" height="20" rx="4" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="117" y1="377" x2="131" y2="377" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="117" y1="384" x2="131" y2="384" stroke="#ffffff" stroke-width="2.5"/>
    <text x="160" y="372" font-family="Inter, sans-serif" font-size="17" font-weight="700" fill="#111827">Kontext</text>
    <rect x="160" y="382" width="460" height="14" rx="7" fill="#e5e7eb"/>
    <rect x="160" y="404" width="320" height="14" rx="7" fill="#eef2ff"/>
  </g>

  <!-- Row: Format (right column) -->
  <g>
    <circle cx="660" cy="220" r="24" fill="url(#pkCoral)"/>
    <rect x="648" y="208" width="24" height="24" rx="4" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="654" y1="216" x2="666" y2="216" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="654" y1="223" x2="666" y2="223" stroke="#ffffff" stroke-width="2.5"/>
    <text x="696" y="212" font-family="Inter, sans-serif" font-size="17" font-weight="700" fill="#111827">Format</text>
    <rect x="696" y="222" width="380" height="14" rx="7" fill="#e5e7eb"/>
    <rect x="696" y="244" width="240" height="14" rx="7" fill="#fff1f2"/>
  </g>

  <!-- result preview block -->
  <rect x="624" y="290" width="452" height="148" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="652" y="324" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#6b7280">Ergebnis (Beispiel)</text>
  <rect x="652" y="340" width="396" height="12" rx="6" fill="#f3f4f6"/>
  <rect x="652" y="362" width="396" height="12" rx="6" fill="#f3f4f6"/>
  <rect x="652" y="384" width="320" height="12" rx="6" fill="#f3f4f6"/>
  <rect x="652" y="406" width="200" height="12" rx="6" fill="#f3f4f6"/>
</svg>
