<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" role="img" aria-labelledby="kwaix-ablauf-title">
  <title id="kwaix-ablauf-title">Ablauf des KI-Trainings in 5 Schritten</title>
  <defs>
    <linearGradient id="stepFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="260" fill="#ffffff"/>

  <!-- connector line -->
  <line x1="100" y1="60" x2="900" y2="60" stroke="#e5e7eb" stroke-width="4"/>

  <!-- Step 1 -->
  <g>
    <circle cx="100" cy="60" r="28" fill="url(#stepFill)"/>
    <text x="100" y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff">1</text>
    <rect x="20" y="120" width="160" height="80" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="100" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#111827">Anfrage &amp;</text>
    <text x="100" y="172" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#111827">Bedarfsanalyse</text>
  </g>

  <!-- Step 2 -->
  <g>
    <circle cx="300" cy="60" r="28" fill="url(#stepFill)"/>
    <text x="300" y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff">2</text>
    <rect x="220" y="120" width="160" height="80" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="300" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#111827">Kick-off-</text>
    <text x="300" y="172" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#111827">Workshop</text>
  </g>

  <!-- Step 3 -->
  <g>
    <circle cx="500" cy="60" r="28" fill="url(#stepFill)"/>
    <text x="500" y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff">3</text>
    <rect x="420" y="120" width="160" height="80" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="500" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#111827">Live-Training</text>
    <text x="500" y="172" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#111827">(vor Ort/remote)</text>
  </g>

  <!-- Step 4 -->
  <g>
    <circle cx="700" cy="60" r="28" fill="url(#stepFill)"/>
    <text x="700" y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff">4</text>
    <rect x="620" y="120" width="160" height="80" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="700" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#111827">Praxisphase</text>
    <text x="700" y="172" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#111827">im Team</text>
  </g>

  <!-- Step 5 -->
  <g>
    <circle cx="900" cy="60" r="28" fill="url(#stepFill)"/>
    <text x="900" y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff">5</text>
    <rect x="820" y="120" width="160" height="80" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="900" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#111827">Abschluss &amp;</text>
    <text x="900" y="172" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#111827">Zertifikat</text>
  </g>
</svg>
