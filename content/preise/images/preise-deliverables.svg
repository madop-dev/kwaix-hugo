<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" role="img" aria-labelledby="kwaix-preise-deliverables-title">
  <title id="kwaix-preise-deliverables-title">Deliverables: Policy-Template, Prompt-Bibliothek, Use-Case-Backlog und Kompetenznachweis</title>
  <defs>
    <linearGradient id="delIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="delCoral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" fill="#ffffff"/>

  <!-- Block 1: Policy-Template -->
  <g>
    <rect x="40" y="20" width="260" height="220" rx="16" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="76" y="56" width="56" height="56" rx="12" fill="url(#delIndigo)"/>
    <rect x="92" y="70" width="24" height="32" rx="3" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="97" y1="78" x2="111" y2="78" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="97" y1="86" x2="111" y2="86" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="97" y1="94" x2="107" y2="94" stroke="#ffffff" stroke-width="2.5"/>
    <text x="76" y="148" font-family="Inter, sans-serif" font-size="19" font-weight="700" fill="#111827">Policy-Template</text>
    <text x="76" y="176" font-family="Inter, sans-serif" font-size="14" fill="#6b7280">Vorlage für Ihre</text>
    <text x="76" y="196" font-family="Inter, sans-serif" font-size="14" fill="#6b7280">KI-Richtlinie</text>
  </g>

  <!-- Block 2: Prompt-Bibliothek -->
  <g>
    <rect x="320" y="20" width="260" height="220" rx="16" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="356" y="56" width="56" height="56" rx="12" fill="url(#delCoral)"/>
    <rect x="370" y="68" width="28" height="34" rx="3" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="376" y1="78" x2="392" y2="78" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="376" y1="86" x2="392" y2="86" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="376" y1="94" x2="386" y2="94" stroke="#ffffff" stroke-width="2.5"/>
    <text x="356" y="148" font-family="Inter, sans-serif" font-size="19" font-weight="700" fill="#111827">Prompt-Bibliothek</text>
    <text x="356" y="176" font-family="Inter, sans-serif" font-size="14" fill="#6b7280">Erprobte Vorlagen</text>
    <text x="356" y="196" font-family="Inter, sans-serif" font-size="14" fill="#6b7280">für den Arbeitsalltag</text>
  </g>

  <!-- Block 3: Use-Case-Backlog -->
  <g>
    <rect x="600" y="20" width="260" height="220" rx="16" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="636" y="56" width="56" height="56" rx="12" fill="url(#delIndigo)"/>
    <rect x="652" y="68" width="24" height="10" rx="2" fill="none" stroke="#ffffff" stroke-width="3"/>
    <rect x="652" y="82" width="24" height="10" rx="2" fill="none" stroke="#ffffff" stroke-width="3"/>
    <rect x="652" y="96" width="24" height="10" rx="2" fill="none" stroke="#ffffff" stroke-width="3"/>
    <text x="636" y="148" font-family="Inter, sans-serif" font-size="19" font-weight="700" fill="#111827">Use-Case-Backlog</text>
    <text x="636" y="176" font-family="Inter, sans-serif" font-size="14" fill="#6b7280">Priorisierte</text>
    <text x="636" y="196" font-family="Inter, sans-serif" font-size="14" fill="#6b7280">Anwendungsfälle</text>
  </g>

  <!-- Block 4: Nachweis -->
  <g>
    <rect x="880" y="20" width="280" height="220" rx="16" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="916" y="56" width="56" height="56" rx="12" fill="url(#delCoral)"/>
    <circle cx="944" cy="76" r="14" fill="none" stroke="#ffffff" stroke-width="3.5"/>
    <path d="M 936 76 l 5 5 l 9 -11" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 936 88 l -6 14 l 14 -4 z" fill="#ffffff"/>
    <path d="M 952 88 l 6 14 l -14 -4 z" fill="#ffffff"/>
    <text x="916" y="148" font-family="Inter, sans-serif" font-size="19" font-weight="700" fill="#111827">Nachweis</text>
    <text x="916" y="176" font-family="Inter, sans-serif" font-size="14" fill="#6b7280">Kompetenznachweis</text>
    <text x="916" y="196" font-family="Inter, sans-serif" font-size="14" fill="#6b7280">nach Artikel 4 KI-VO</text>
  </g>
</svg>
