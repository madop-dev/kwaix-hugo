  <rect x="280" y="200" width="290" height="90" rx="12" fill="#eef2ff" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="425" cy="245" r="18" fill="url(#matrixIndigo)"/>
  <path d="M 416 245 l 6 6 l 12 -14" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="425" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#4b5563">enthalten</text>
  <rect x="590" y="200" width="290" height="90" rx="12" fill="#eef2ff" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="735" cy="245" r="18" fill="url(#matrixIndigo)"/>
  <path d="M 726 245 l 6 6 l 12 -14" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="735" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#4b5563">enthalten</text>
