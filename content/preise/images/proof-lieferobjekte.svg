<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="kwaix-lieferobjekte-title">
  <title id="kwaix-lieferobjekte-title">Vorschau der Lieferobjekte: Policy-Template, Prompt-Bibliothek und Use-Case-Backlog als Dokumentkarten</title>
  <defs>
    <linearGradient id="loIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="loCoral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" fill="#ffffff"/>

  <!-- Card 1: Policy-Template -->
  <g>
    <rect x="40" y="30" width="350" height="300" rx="14" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="40" y="30" width="350" height="36" rx="14" fill="#f3f4f6"/>
    <rect x="40" y="48" width="350" height="18" fill="#f3f4f6"/>
    <circle cx="62" cy="48" r="6" fill="#f43f5e"/>
    <circle cx="82" cy="48" r="6" fill="#fbbf24"/>
    <circle cx="102" cy="48" r="6" fill="#22c55e"/>

    <rect x="64" y="90" width="48" height="48" rx="10" fill="url(#loIndigo)"/>
    <rect x="80" y="104" width="20" height="26" rx="3" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="85" y1="112" x2="97" y2="112" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="85" y1="119" x2="97" y2="119" stroke="#ffffff" stroke-width="2.5"/>

    <text x="64" y="172" font-family="Inter, sans-serif" font-size="19" font-weight="700" fill="#111827">Policy-Template</text>
    <rect x="64" y="192" width="280" height="12" rx="6" fill="#e5e7eb"/>
    <rect x="64" y="212" width="240" height="12" rx="6" fill="#e5e7eb"/>
    <rect x="64" y="232" width="260" height="12" rx="6" fill="#e5e7eb"/>
    <rect x="64" y="262" width="120" height="28" rx="14" fill="#eef2ff"/>
    <text x="124" y="281" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#4f46e5">.docx</text>
  </g>

  <!-- Card 2: Prompt-Bibliothek -->
  <g>
    <rect x="425" y="30" width="350" height="300" rx="14" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="425" y="30" width="350" height="36" rx="14" fill="#f3f4f6"/>
    <rect x="425" y="48" width="350" height="18" fill="#f3f4f6"/>
    <circle cx="447" cy="48" r="6" fill="#f43f5e"/>
    <circle cx="467" cy="48" r="6" fill="#fbbf24"/>
    <circle cx="487" cy="48" r="6" fill="#22c55e"/>

    <rect x="449" y="90" width="48" height="48" rx="10" fill="url(#loCoral)"/>
    <rect x="463" y="102" width="28" height="34" rx="3" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="469" y1="112" x2="485" y2="112" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="469" y1="120" x2="485" y2="120" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="469" y1="128" x2="479" y2="128" stroke="#ffffff" stroke-width="2.5"/>

    <text x="449" y="172" font-family="Inter, sans-serif" font-size="19" font-weight="700" fill="#111827">Prompt-Bibliothek</text>
    <rect x="449" y="192" width="280" height="12" rx="6" fill="#e5e7eb"/>
    <rect x="449" y="212" width="240" height="12" rx="6" fill="#e5e7eb"/>
    <rect x="449" y="232" width="260" height="12" rx="6" fill="#e5e7eb"/>
    <rect x="449" y="262" width="120" height="28" rx="14" fill="#fff1f2"/>
    <text x="509" y="281" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#f43f5e">.pdf</text>
  </g>

  <!-- Card 3: Use-Case-Backlog -->
  <g>
    <rect x="810" y="30" width="350" height="300" rx="14" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="810" y="30" width="350" height="36" rx="14" fill="#f3f4f6"/>
    <rect x="810" y="48" width="350" height="18" fill="#f3f4f6"/>
    <circle cx="832" cy="48" r="6" fill="#f43f5e"/>
    <circle cx="852" cy="48" r="6" fill="#fbbf24"/>
    <circle cx="872" cy="48" r="6" fill="#22c55e"/>

    <rect x="834" y="90" width="48" height="48" rx="10" fill="url(#loIndigo)"/>
    <rect x="848" y="102" width="22" height="9" rx="2" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <rect x="848" y="115" width="22" height="9" rx="2" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <rect x="848" y="128" width="22" height="9" rx="2" fill="none" stroke="#ffffff" stroke-width="2.5"/>

    <text x="834" y="172" font-family="Inter, sans-serif" font-size="19" font-weight="700" fill="#111827">Use-Case-Backlog</text>
    <rect x="834" y="192" width="280" height="12" rx="6" fill="#e5e7eb"/>
    <rect x="834" y="212" width="240" height="12" rx="6" fill="#e5e7eb"/>
    <rect x="834" y="232" width="260" height="12" rx="6" fill="#e5e7eb"/>
    <rect x="834" y="262" width="120" height="28" rx="14" fill="#eef2ff"/>
    <text x="894" y="281" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#4f46e5">.xlsx</text>
  </g>
</svg>
