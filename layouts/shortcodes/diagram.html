{{- $src := .Get "src" -}}
{{- $alt := .Get "alt" -}}
{{- $class := .Get "class" -}}
{{- $res := .Page.Resources.GetMatch $src -}}
<div class="kx-diagram{{ with $class }} {{ . }}{{ end }}">
{{- if $res -}}
  <img src="{{ $res.RelPermalink }}" alt="{{ $alt }}" loading="lazy" decoding="async">
{{- else -}}
  <img src="{{ $src }}" alt="{{ $alt }}" loading="lazy" decoding="async">
{{- end -}}
</div>
