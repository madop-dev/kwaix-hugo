{{ define "main" }}
<article class="page">
<div class="container">
<h1 class="reveal">{{ .Title }}</h1>
{{ if .Description }}<p class="page-desc reveal d1">{{ .Description }}</p>{{ end }}
<div class="page-content reveal d2">
{{ .Content }}
</div>
{{ if .Pages }}
<div class="post-list">
{{ range .Pages }}
<a href="{{ .Permalink }}" class="post-card reveal">
<div class="post-meta">{{ .Date.Format "02.01.2006" }}</div>
<h2>{{ .Title }}</h2>
<p>{{ .Description | default (.Summary | truncate 160) }}</p>
<span class="post-link">Weiterlesen →</span>
</a>
{{ end }}
</div>
{{ end }}
</div>
</article>
{{ end }}
