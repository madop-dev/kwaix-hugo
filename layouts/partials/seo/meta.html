<title>{{ if .IsHome }}KWAIX | KI-Training für KMU und Mittelstand{{ else }}{{ .Title }} | KWAIX{{ end }}</title>
<meta name="description" content="{{ .Description | default .Site.Params.description }}">
<link rel="canonical" href="{{ .Permalink }}">
{{- if .Params.noindex }}
<meta name="robots" content="noindex, nofollow">
{{- else }}
<meta name="robots" content="index, follow">
{{- end }}
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ .Description | default .Site.Params.description }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="KWAIX">
<meta property="og:locale" content="de_DE">
{{- $ogImg := "" }}
{{- with .Params.ogImage }}
{{- $img := $.Resources.GetMatch . }}
{{- if $img }}{{ $ogImg = $img.Permalink }}{{ else }}{{ $ogImg = ( . | absURL ) }}{{ end }}
{{- else }}
{{- $ogImg = "/og-default.jpg" | absURL }}
{{- end }}
<meta property="og:image" content="{{ $ogImg }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ .Title }}">
<meta name="twitter:description" content="{{ .Description | default .Site.Params.description }}">
<meta name="twitter:image" content="{{ $ogImg }}">
