{{- $site := .Site -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "LocalBusiness",
      "name": "KWAIX",
      "description": "{{ $site.Params.description }}",
      "url": "{{ $site.BaseURL }}",
      "email": "{{ $site.Params.email }}",
      "telephone": "{{ $site.Params.phone }}",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Waller Stieg 3",
        "postalCode": "28217",
        "addressLocality": "Bremen",
        "addressRegion": "Bremen",
        "addressCountry": "DE"
      },
      "areaServed": [
        {"@type": "City", "name": "Bremen"},
        {"@type": "City", "name": "Bremerhaven"},
        {"@type": "City", "name": "Delmenhorst"},
        {"@type": "City", "name": "Achim"},
        {"@type": "City", "name": "Oldenburg"}
      ],
      "priceRange": "€€",
      "knowsAbout": ["Künstliche Intelligenz", "KI-Training", "KI-Automation", "KI-Chatbots", "Digitalisierung"],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "KI-Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "KI-Training",
              "description": "60-Minuten KI-Workshops für Teams und Führungskräfte"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "KI-Automation",
              "description": "Automatisierung von Geschäftsprozessen mit KI"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "KI-Chatbots",
              "description": "Intelligente Chatbots für Kundensupport"
            }
          }
        ]
      }
    },
    {
      "@type": "WebSite",
      "name": "KWAIX",
      "url": "{{ $site.BaseURL }}",
      "inLanguage": "de-DE",
      "publisher": {
        "@type": "Organization",
        "name": "KWAIX"
      }
    }
  ]
}
</script>
{{- with .Params.schemaType }}
{{- $type := lower . }}
{{- if eq $type "service" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Service",
  "name": "{{ $.Title }}",
  "description": "{{ $.Description }}",
  "url": "{{ $.Permalink }}",
  "areaServed": "DE",
  "provider": {
    "@type": "LocalBusiness",
    "name": "KWAIX",
    "url": "{{ $site.BaseURL }}"
  }
}
</script>
{{- else if eq $type "course" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Course",
  "name": "{{ $.Title }}",
  "description": "{{ $.Description }}",
  "url": "{{ $.Permalink }}",
  "provider": {
    "@type": "Organization",
    "name": "KWAIX",
    "sameAs": "{{ $site.BaseURL }}"
  }
}
</script>
{{- else if eq $type "faq" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "name": "{{ $.Title }}",
  "url": "{{ $.Permalink }}"
}
</script>
{{- else }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "{{ . }}",
  "name": "{{ $.Title }}",
  "description": "{{ $.Description }}",
  "url": "{{ $.Permalink }}",
  "provider": {
    "@type": "LocalBusiness",
    "name": "KWAIX",
    "url": "{{ $site.BaseURL }}"
  }
}
</script>
{{- end }}
{{- end }}
